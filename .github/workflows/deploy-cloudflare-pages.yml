name: Deploy lab-nextjs-site to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "sites/lab-nextjs-site/**"
      - ".github/workflows/deploy-cloudflare-pages.yml"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: sites/lab-nextjs-site
        run: npm install

      - name: Build
        working-directory: sites/lab-nextjs-site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: sites/lab-nextjs-site
          command: pages deploy out --project-name=lab-nextjs-site-mirror --branch=main
